<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATLAS Preview</title>
    <style>
      :root {
        --bg: #060606;
        --panel: #0a0a0a;
        --text: #f3f3f3;
        --muted: #9a9a9a;
        --line: #1f1f1f;
        --brand: #f3f3f3;
        --brand-2: #d5d5d5;
        --accent: #f3f3f3;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "Avenir", "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .container { width: min(1460px, calc(100% - 1.5rem)); margin: 0 auto; }
      .header {
        position: sticky; top: 0; z-index: 30;
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(10px);
        background: rgba(6, 6, 6, 0.92);
      }
      .header-row {
        height: 62px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }
      .brand {
        border: 0;
        background: transparent;
        padding: 0;
        margin: 0;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
      }
      .brand img {
        display: block;
        height: 66px;
        width: auto;
      }

      .nav {
        display: flex;
        gap: 1.8rem;
        align-items: center;
        margin-left: auto;
      }
      .nav button {
        border: 0;
        background: transparent;
        color: #9a9a9a;
        cursor: pointer;
        font-size: 0.86rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        height: auto;
        padding: 0;
        font-weight: 600;
      }
      .nav button.active, .nav button:hover { color: #f3f3f3; }

      .actions { display: flex; gap: 0.6rem; align-items: center; }
      .btn {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--text);
        border-radius: 999px;
        padding: 0.62rem 1rem;
        font-size: 0.88rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 160ms ease, background 160ms ease;
      }
      .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(22, 56, 95, 0.16); }
      .btn.primary { background: var(--brand); color: #ffffff; border-color: var(--brand); }
      .btn.primary:hover { background: var(--brand-2); }

      .page-wrap { min-height: calc(100vh - 76px); }
      .page {
        padding: 2rem 0 3.2rem;
        opacity: 0;
        transform: translateY(8px);
        animation: reveal 220ms ease-out forwards;
      }
      @keyframes reveal {
        to { opacity: 1; transform: translateY(0); }
      }

      .hero {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--line);
        background: linear-gradient(160deg, #2f6faa 15%, #2f6faa 56%, #3d7fbb 100%);
        border-radius: 32px;
        padding: 2.2rem;
      }
      .hero-bg-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.22;
        filter: saturate(0.7) contrast(0.94) brightness(0.8);
        pointer-events: none;
      }
      .hero-overlay {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 20% 10%, rgba(31, 88, 145, 0.38), rgba(31, 88, 145, 0) 42%),
          linear-gradient(180deg, rgba(26, 77, 128, 0.26), rgba(26, 77, 128, 0.42));
        pointer-events: none;
      }
      .hero-content {
        position: relative;
        z-index: 1;
        color: #ffffff;
      }
      .hero-center { text-align: center; max-width: 900px; margin: 0 auto; }
      .badge {
        display: inline-flex; align-items: center; gap: 0.45rem;
        border: 1px solid var(--line); border-radius: 999px;
        padding: 0.35rem 0.7rem; font-size: 0.76rem; color: #ecf5ff;
        background: rgba(36, 93, 146, 0.55);
      }
      .dot { width: 9px; height: 9px; border-radius: 99px; background: var(--accent); }
      h1 { font-size: clamp(2rem, 5vw, 3.8rem); line-height: 1.1; letter-spacing: -0.02em; margin: 1rem 0 0; }
      .lead { color: #eaf3ff; line-height: 1.7; max-width: 820px; margin: 1rem auto 0; }

      .stack-row { margin-top: 1.3rem; display: flex; flex-wrap: wrap; justify-content: center; gap: 0.6rem; }
      .proof { margin-top: 1.8rem; display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; color: #d9e9fa; font-size: 0.9rem; }
      .proof b { color: #ffffff; }
      .trusted-wrap { margin-top: 2.4rem; }
      .trusted-wrap small {
        display: block;
        margin-bottom: 0.7rem;
        text-transform: uppercase;
        color: #8fb0d3;
        letter-spacing: 0.08em;
        font-weight: 700;
        font-size: 0.72rem;
      }
      .marquee {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #edf6ff;
        mask-image: linear-gradient(to right, transparent, black 9%, black 91%, transparent);
        -webkit-mask-image: linear-gradient(to right, transparent, black 9%, black 91%, transparent);
        cursor: grab;
        user-select: none;
        -webkit-user-select: none;
        touch-action: pan-y;
      }
      .marquee.dragging { cursor: grabbing; }
      .marquee-track {
        width: max-content;
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 1.1rem 0.8rem;
      }
      .logo-pill {
        flex: 0 0 auto;
        min-width: 220px;
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 1.2rem;
        border-radius: 13px;
        border: 1px solid #6c98c2;
        background: rgba(245, 251, 255, 0.98);
      }
      .logo-pill img {
        display: block;
        max-width: 190px;
        max-height: 44px;
        width: auto;
        height: auto;
        object-fit: contain;
        pointer-events: none;
        user-select: none;
        -webkit-user-drag: none;
      }
      .scroll-story {
        margin-top: 1.6rem;
        display: grid;
        gap: 1rem;
      }
      .story-pin {
        border: 1px solid var(--line);
        border-radius: 22px;
        background: linear-gradient(165deg, #f6fbff, #edf6ff);
        padding: 1.2rem;
      }
      .story-pin h2 {
        margin: 0;
        font-size: clamp(1.45rem, 3.2vw, 2rem);
        letter-spacing: -0.02em;
      }
      .story-pin p {
        margin: 0.55rem 0 0;
        color: var(--muted);
        line-height: 1.65;
      }
      .story-track {
        display: grid;
        gap: 0.85rem;
      }
      .story-step {
        border: 1px solid var(--line);
        border-radius: 20px;
        background: #f8fbff;
        padding: 1rem;
      }
      .story-step b {
        display: inline-block;
        color: #9fd0ff;
        font-size: 0.78rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .story-step h3 {
        margin: 0.48rem 0 0;
        font-size: 1.15rem;
      }
      .story-step p {
        margin: 0.5rem 0 0;
        color: var(--muted);
        line-height: 1.62;
      }
      .unfold-zone {
        margin-top: 1.2rem;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: #f7fbff;
        padding: 1rem;
      }
      .service-block {
        margin-top: 2.8rem;
        border: 1px solid #c9ddf0;
        border-radius: 24px;
        background: linear-gradient(180deg, #f8fcff, #eef6ff);
        padding: 1.25rem;
      }
      .service-block .unfold-head h3 {
        font-size: clamp(1.35rem, 3vw, 1.85rem);
      }
      .service-block .unfold-head p {
        margin: 0.62rem 0 0;
        max-width: 780px;
        color: #4f7398;
        line-height: 1.62;
      }
      .core-stage {
        border-color: #c4dbf1;
        background: linear-gradient(180deg, #f7fbff, #edf6ff);
      }
      .kbw-stage {
        border: 1px solid #b8d5ee;
        background:
          radial-gradient(circle at 100% 0%, rgba(146, 190, 233, 0.28), rgba(146, 190, 233, 0) 42%),
          linear-gradient(180deg, #f1f8ff, #e9f3ff);
        padding: 1.2rem;
      }
      .source-stage {
        padding: 1.2rem;
        background:
          radial-gradient(circle at 10% 0%, rgba(72, 141, 212, 0.14), rgba(72, 141, 212, 0) 42%),
          radial-gradient(circle at 100% 100%, rgba(34, 99, 168, 0.16), rgba(34, 99, 168, 0) 44%),
          rgba(5, 28, 56, 0.8);
      }
      .unfold-head small {
        text-transform: uppercase;
        color: #8fb0d3;
        letter-spacing: 0.08em;
        font-weight: 700;
        font-size: 0.72rem;
      }
      .unfold-head h3 {
        margin: 0.42rem 0 0;
        font-size: 1.28rem;
      }
      .source-stage .unfold-head p {
        margin: 0.62rem 0 0;
        max-width: 760px;
        color: #4f7398;
        line-height: 1.65;
      }
      .core-subtitle {
        margin: 0;
        color: #b9d7f5;
        letter-spacing: 0.08em;
        font-size: 0.72rem;
        text-transform: uppercase;
        font-weight: 700;
      }
      .unfold-cards {
        margin-top: 0.85rem;
        display: grid;
        gap: 0.7rem;
      }
      .source-stage .unfold-cards {
        margin-top: 1.1rem;
        gap: 0.95rem;
      }
      .asset-card {
        border: 1px solid #cadef1;
        background: #ffffff;
        border-radius: 16px;
        padding: 0.8rem 0.9rem;
      }
      .source-stage .asset-card {
        padding: 1rem 1.05rem;
        min-height: 142px;
        position: relative;
        overflow: hidden;
        background: linear-gradient(160deg, #ffffff, #f3f9ff);
      }
      .source-stage .asset-card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        height: 3px;
        width: 100%;
        background: linear-gradient(90deg, #51a8ff, rgba(81, 168, 255, 0.2));
      }
      .asset-kicker {
        display: inline-flex;
        margin-bottom: 0.55rem;
        border: 1px solid #b8d2ea;
        border-radius: 999px;
        padding: 0.18rem 0.5rem;
        font-size: 0.69rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #4c739a;
      }
      .asset-card h4 {
        margin: 0;
        font-size: 0.97rem;
      }
      .asset-card p {
        margin: 0.35rem 0 0;
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.55;
      }
      .reveal {
        opacity: 0;
        transform: translateY(22px);
        transition: opacity 520ms ease, transform 520ms ease;
      }
      .reveal.inview {
        opacity: 1;
        transform: translateY(0);
      }
      .unfold-cards .asset-card {
        transform: translateY(18px) scale(0.985);
        opacity: 0;
        transition: transform 520ms ease, opacity 520ms ease;
      }
      .unfold-cards.inview .asset-card {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      .unfold-cards.inview .asset-card:nth-child(2) { transition-delay: 90ms; }
      .unfold-cards.inview .asset-card:nth-child(3) { transition-delay: 170ms; }
      .unfold-cards.inview .asset-card:nth-child(4) { transition-delay: 250ms; }
      .unfold-cards.inview .asset-card:nth-child(5) { transition-delay: 330ms; }
      .unfold-cards.inview .asset-card:nth-child(6) { transition-delay: 410ms; }

      .grid { display: grid; gap: 0.9rem; margin-top: 1rem; }
      .grid-3 { grid-template-columns: 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
      .grid-4 { grid-template-columns: 1fr; }
      .card {
        border: 1px solid var(--line); border-radius: 24px; background: #ffffff;
        padding: 1.1rem; box-shadow: 0 8px 28px rgba(3, 12, 26, 0.32);
      }
      .card h3 { margin: 0; font-size: 1rem; }
      .card p { margin: 0.55rem 0 0; color: var(--muted); line-height: 1.55; font-size: 0.9rem; }
      .tag { display: inline-block; border: 1px solid #b8d4ed; border-radius: 999px; padding: 0.2rem 0.55rem; font-size: 0.7rem; color: #2f679c; background: #eef6ff; font-weight: 600; }
      .kbw-visual {
        margin: 0.9rem 0 1rem;
        border: 1px solid var(--line);
        border-radius: 20px;
        overflow: hidden;
        background: #f5faff;
      }
      .kbw-visual img {
        display: block;
        width: 100%;
        height: auto;
      }
      .format-section {
        margin-top: 3rem;
        border-radius: 26px;
        border: 1px solid var(--line);
        overflow: hidden;
      }
      .format-section.white {
        background: #ffffff;
      }
      .format-section.brand {
        background: linear-gradient(165deg, #2f6faa, #255f95);
        border-color: #3f7bb2;
      }
      .format-head {
        display: grid;
        gap: 0.8rem;
        padding: 1.4rem 1.4rem 0.6rem;
      }
      .format-eyebrow {
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.11em;
        font-weight: 800;
        margin: 0 0 0.15rem;
      }
      .format-section.white .format-eyebrow { color: #6e95bb; }
      .format-section.brand .format-eyebrow { color: rgba(232, 243, 255, 0.78); }
      .format-title {
        margin: 0;
        font-size: clamp(1.5rem, 3vw, 2rem);
        letter-spacing: -0.02em;
      }
      .format-section.brand .format-title { color: #f7fbff; }
      .format-copy {
        margin: 0;
        max-width: 820px;
        line-height: 1.65;
      }
      .format-section.white .format-copy { color: var(--muted); }
      .format-section.brand .format-copy { color: rgba(236, 245, 255, 0.9); }
      .format-body {
        padding: 0.95rem 1.4rem 1.4rem;
      }
      .format-grid {
        display: grid;
        gap: 0.9rem;
      }
      .format-grid.two { grid-template-columns: 1fr; }
      .format-grid.four { grid-template-columns: 1fr; }
      .format-card {
        border-radius: 18px;
        padding: 1rem;
      }
      .format-section.white .format-card {
        border: 1px solid #d3e4f3;
        background: #f8fbff;
      }
      .format-section.brand .format-card {
        border: 1px solid rgba(188, 217, 245, 0.48);
        background: rgba(22, 79, 130, 0.72);
        backdrop-filter: blur(2px);
      }
      .format-section.brand .format-card h4,
      .format-section.brand .format-card p,
      .format-section.brand .format-card .tag {
        color: #eef6ff;
      }
      .format-section.brand .format-card p {
        color: #dcecff;
      }
      .format-section.brand .format-card .tag {
        border-color: rgba(221, 238, 255, 0.56);
        background: rgba(236, 245, 255, 0.16);
      }
      .format-card h4 {
        margin: 0;
        font-size: 1rem;
      }
      .format-card p {
        margin: 0.45rem 0 0;
        line-height: 1.6;
        color: var(--muted);
      }
      .format-band {
        margin-top: 1rem;
        border-top: 1px solid rgba(214, 230, 246, 0.32);
        padding-top: 1rem;
      }
      .format-kbw-image {
        margin-top: 1rem;
        border: 1px solid #d1e3f3;
        border-radius: 18px;
        overflow: hidden;
        background: #f5faff;
      }
      .format-kbw-image img {
        display: block;
        width: 100%;
        height: auto;
      }
      .ws-hero {
        margin-top: 1.2rem;
        border: 1px solid #d5e5f3;
        border-radius: 30px;
        background: linear-gradient(180deg, #ffffff, #f4f9ff);
        padding: 2rem 1.4rem;
      }
      .ws-kicker {
        margin: 0;
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #6b8fb2;
        font-weight: 700;
      }
      .ws-title {
        margin: 0.8rem 0 0;
        font-size: clamp(2.2rem, 7.4vw, 5.4rem);
        line-height: 0.97;
        letter-spacing: -0.03em;
        color: #1f4f7f;
      }
      .ws-sub {
        margin: 1.05rem 0 0;
        max-width: 820px;
        color: #567a9f;
        line-height: 1.65;
        font-size: clamp(0.98rem, 1.45vw, 1.1rem);
      }
      .ws-trusted {
        margin-top: 2rem;
      }
      .ws-trusted h3 {
        margin: 0;
        font-size: clamp(1.1rem, 2vw, 1.4rem);
        letter-spacing: -0.01em;
      }
      .ws-section {
        margin-top: 3.3rem;
      }
      .ws-section-head {
        margin: 0 0 1rem;
      }
      .ws-section-head h3 {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        letter-spacing: -0.02em;
      }
      .ws-section-head p {
        margin: 0.6rem 0 0;
        max-width: 850px;
        color: #5a7ea4;
        line-height: 1.65;
      }
      .ws-block {
        border: 1px solid #d2e4f3;
        border-radius: 26px;
        background: #ffffff;
        padding: 1.2rem;
      }
      .ws-block.brand {
        border-color: #3f7ab0;
        background: linear-gradient(165deg, #2f6faa, #295f92);
      }
      .ws-block.brand .ws-section-head h3,
      .ws-block.brand .ws-section-head p,
      .ws-block.brand .ws-tagline {
        color: #f4f9ff;
      }
      .ws-grid {
        display: grid;
        gap: 0.85rem;
      }
      .ws-grid.two { grid-template-columns: 1fr; }
      .ws-grid.four { grid-template-columns: 1fr; }
      .ws-card {
        border: 1px solid #d8e7f5;
        border-radius: 18px;
        background: #f8fbff;
        padding: 1rem;
      }
      .ws-block.brand .ws-card {
        border-color: rgba(214, 232, 249, 0.38);
        background: rgba(14, 63, 108, 0.34);
      }
      .ws-card h4 {
        margin: 0;
        font-size: 1rem;
        letter-spacing: -0.01em;
      }
      .ws-card p {
        margin: 0.42rem 0 0;
        color: #5f82a6;
        line-height: 1.6;
      }
      .ws-block.brand .ws-card p { color: rgba(233, 245, 255, 0.87); }
      .ws-tagline {
        margin: 0;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #7094b8;
      }
      .ws-kbw-media {
        margin-top: 1rem;
      }
      .ws-footer-note {
        margin-top: 2.3rem;
        padding-top: 1.1rem;
        border-top: 1px solid #d8e7f5;
        color: #6f90b3;
        font-size: 0.86rem;
      }
      .clone-shell {
        border: 1px solid var(--line);
        background: #070707;
      }
      .clone-hero {
        position: relative;
        min-height: 76vh;
        border-bottom: 1px solid var(--line);
        overflow: hidden;
        --fx-x: 50%;
        --fx-y: 50%;
        --fx-strength: 0;
        --fx-jitter: 0px;
      }
      .clone-hero video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.32;
        filter: grayscale(1) contrast(1.18) brightness(0.76);
        pointer-events: none;
        z-index: 0;
      }
      .clone-hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 78% 44%, rgba(255,255,255,0.14), rgba(255,255,255,0) 52%),
          radial-gradient(circle at 18% 50%, rgba(0,0,0,0.67), rgba(0,0,0,0) 52%),
          linear-gradient(90deg, rgba(3,3,3,0.97) 0%, rgba(4,4,4,0.74) 34%, rgba(4,4,4,0.34) 100%);
        pointer-events: none;
        z-index: 1;
      }
      .clone-fx-layer,
      .clone-fx-noise {
        position: absolute;
        inset: -1px;
        pointer-events: none;
      }
      .clone-fx-layer {
        z-index: 2;
        mix-blend-mode: difference;
        opacity: calc(var(--fx-strength) * 0.24);
        transform: translate3d(var(--fx-jitter), calc(var(--fx-jitter) * -0.65), 0);
        background:
          radial-gradient(circle at var(--fx-x) var(--fx-y), rgba(255,255,255,0.34) 0%, rgba(255,255,255,0.11) 20%, rgba(255,255,255,0.04) 42%, rgba(255,255,255,0.012) 60%, rgba(255,255,255,0) 84%),
          repeating-linear-gradient(0deg, rgba(255,255,255,0.14) 0 1px, rgba(255,255,255,0) 1px 7px),
          repeating-linear-gradient(90deg, rgba(255,255,255,0.12) 0 1px, rgba(255,255,255,0) 1px 7px);
      }
      .clone-fx-noise {
        z-index: 3;
        opacity: calc(var(--fx-strength) * 0.1);
        transform: translateX(calc(var(--fx-jitter) * -0.35));
        mix-blend-mode: soft-light;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.08)),
          repeating-linear-gradient(0deg, rgba(255,255,255,0.045) 0 1px, rgba(0,0,0,0.045) 1px 3px);
        animation: cloneScan 4.2s linear infinite;
      }
      @keyframes cloneScan {
        0% { background-position: 0 0, 0 0; }
        100% { background-position: 0 0, 0 110px; }
      }
      .clone-content {
        position: relative;
        z-index: 4;
        padding: 1.35rem;
        max-width: 620px;
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
      }
      .clone-mark {
        margin: 0 0 1.1rem;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: #efefef;
      }
      .clone-title {
        margin: 0.35rem 0 0;

      function initScrollReveal() {
        const targets = document.querySelectorAll(".reveal, .reveal-group");
        if (!targets.length) return;

        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          targets.forEach((el) => el.classList.add("inview"));
          return;
        }

        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("inview");
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.2, rootMargin: "0px 0px -8% 0px" }
        );

        targets.forEach((el) => observer.observe(el));
      }

      function initMarqueeDrag() {
        const marquees = document.querySelectorAll(".marquee");
        marquees.forEach((marquee) => {
          const track = marquee.querySelector(".marquee-track");
          if (!track) return;

          let offset = 0;
          let dragging = false;
          let lastX = 0;
          const speed = 0.33;

          const normalize = () => {
            const half = track.scrollWidth / 2;
            if (!half) return;
            while (offset >= half) offset -= half;
            while (offset < 0) offset += half;
          };

          const animate = () => {
            if (!marquee.isConnected) return;
            if (!dragging) {
              offset += speed;
              normalize();
              track.style.transform = `translateX(${-offset}px)`;
            }
            requestAnimationFrame(animate);
          };

          marquee.addEventListener("pointerdown", (e) => {
            dragging = true;
            lastX = e.clientX;
            marquee.classList.add("dragging");
            marquee.setPointerCapture(e.pointerId);
          });

          marquee.addEventListener("pointermove", (e) => {
            if (!dragging) return;
            const dx = e.clientX - lastX;
            lastX = e.clientX;
            offset -= dx;
            normalize();
            track.style.transform = `translateX(${-offset}px)`;
          });

          const endDrag = () => {
            dragging = false;
            marquee.classList.remove("dragging");
          };

          marquee.addEventListener("pointerup", endDrag);
          marquee.addEventListener("pointercancel", endDrag);
          marquee.addEventListener("lostpointercapture", endDrag);

          requestAnimationFrame(animate);
        });
      }

      function initLogoMosaic() {
        const root = document.getElementById("logoMosaic");
        if (!root) return;

        const width = root.clientWidth;
        const height = root.clientHeight;
        if (!width || !height) return;

        const source = [...trustedLogos, ...trustedLogos, ...trustedLogos];
        const items = source.slice(0, Math.min(28, source.length * 2)).map((logo) => {
          const el = document.createElement("div");
          el.className = "mosaic-item";

          const img = document.createElement("img");
          img.src = `logo images/${logo.file}`;
          img.alt = `${logo.name} logo`;
          img.loading = "lazy";
          img.onerror = () => el.remove();
          el.appendChild(img);
          root.appendChild(el);

          const w = 120 + Math.random() * 120;
          const h = 30 + Math.random() * 34;
          const x = Math.random() * Math.max(1, width - w);
          const y = Math.random() * Math.max(1, height - h);
          const vx = (Math.random() - 0.5) * 0.16;
          const vy = (Math.random() - 0.5) * 0.16;
          const phase = Math.random() * Math.PI * 2;

          return { el, x, y, w, h, vx, vy, phase };
        });

        let mouseX = -9999;
        let mouseY = -9999;
        const radius = 210;

        const onMove = (e) => {
          const rect = root.getBoundingClientRect();
          mouseX = e.clientX - rect.left;
          mouseY = e.clientY - rect.top;
        };
        const onLeave = () => {
          mouseX = -9999;
          mouseY = -9999;
        };

        root.addEventListener("pointermove", onMove);
        root.addEventListener("pointerleave", onLeave);

        const tick = (t) => {
          if (!root.isConnected) return;

          items.forEach((it) => {
            it.x += it.vx + Math.sin(t * 0.00045 + it.phase) * 0.06;
            it.y += it.vy + Math.cos(t * 0.00035 + it.phase) * 0.05;

            if (it.x <= 0 || it.x >= width - it.w) it.vx *= -1;
            if (it.y <= 0 || it.y >= height - it.h) it.vy *= -1;

            it.x = Math.max(0, Math.min(width - it.w, it.x));
            it.y = Math.max(0, Math.min(height - it.h, it.y));

            const cx = it.x + it.w / 2;
            const cy = it.y + it.h / 2;
            const dist = Math.hypot(mouseX - cx, mouseY - cy);
            const f = Math.max(0, 1 - dist / radius);

            const blur = 1.3 - f * 1.28;
            const gray = 0.2 - f * 0.2;
            const op = 0.58 + f * 0.42;
            const scale = 1 + f * 0.08;

            it.el.style.width = `${it.w}px`;
            it.el.style.height = `${it.h}px`;
            it.el.style.transform = `translate3d(${it.x}px, ${it.y}px, 0) scale(${scale})`;
            it.el.style.opacity = op.toFixed(3);
            it.el.style.filter = `grayscale(${Math.max(0, gray).toFixed(3)}) blur(${Math.max(0, blur).toFixed(2)}px) brightness(${(1.15 + f * 0.2).toFixed(2)})`;
          });

          requestAnimationFrame(tick);
        };

        requestAnimationFrame(tick);
      }

      function initCloneHeroFx() {
        const hero = document.querySelector(".clone-hero");
        if (!hero) return;

        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          hero.style.setProperty("--fx-strength", "0");
          return;
        }

        let targetX = 0.5;
        let targetY = 0.5;
        let x = 0.5;
        let y = 0.5;
        let strength = 0;
        let targetStrength = 0;
        let hovering = false;
        let lastMoveAt = 0;
        const idleDelayMs = 420;

        const updateTarget = (clientX, clientY) => {
          const rect = hero.getBoundingClientRect();
          if (!rect.width || !rect.height) return;
          targetX = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
          targetY = Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
          hovering = true;
          lastMoveAt = performance.now();
          targetStrength = 0.94;
        };

        hero.addEventListener("pointermove", (e) => updateTarget(e.clientX, e.clientY));
        hero.addEventListener("pointerenter", (e) => updateTarget(e.clientX, e.clientY));
        hero.addEventListener("pointerdown", (e) => {
          updateTarget(e.clientX, e.clientY);
          targetStrength = 1.04;
        });
        hero.addEventListener("pointerleave", () => {
          hovering = false;
          targetStrength = 0;
        });

        const tick = () => {
          if (!hero.isConnected) return;

          x += (targetX - x) * 0.16;
          y += (targetY - y) * 0.16;
          strength += (targetStrength - strength) * 0.14;
          const idle = performance.now() - lastMoveAt > idleDelayMs;
          const restingTarget = hovering && !idle ? 0.9 : 0;
          targetStrength += (restingTarget - targetStrength) * 0.08;

          const jitter = (Math.random() - 0.5) * (1.1 + strength * 7.8);

          hero.style.setProperty("--fx-x", `${(x * 100).toFixed(2)}%`);
          hero.style.setProperty("--fx-y", `${(y * 100).toFixed(2)}%`);
          hero.style.setProperty("--fx-strength", strength.toFixed(3));
          hero.style.setProperty("--fx-jitter", `${jitter.toFixed(2)}px`);

          requestAnimationFrame(tick);
        };

        requestAnimationFrame(tick);
      }

      function initAdvisoryTrackMotion() {
        const motion = document.querySelector(".advisory-motion");
        if (!motion) return;

        const cards = [...motion.querySelectorAll(".advisory-step")];
        if (!cards.length) return;

        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          cards.forEach((card) => {
            card.style.transform = "translate3d(0, 0, 0)";
          });
          return;
        }

        const count = cards.length;
        const stepSize = 1 / Math.max(1, count - 1);
        const startDelay = 0.24;

        const tick = () => {
          if (!motion.isConnected) return;

          const rect = motion.getBoundingClientRect();
          const total = Math.max(1, rect.height - window.innerHeight);
          const rawProgress = Math.max(0, Math.min(1, -rect.top / total));
          const progress = Math.max(0, Math.min(1, (rawProgress - startDelay) / (1 - startDelay)));

          cards.forEach((card, index) => {
            let x = 0;
            if (index === 0) {
              x = 0;
            } else {
              const start = (index - 1) * stepSize;
              const end = index * stepSize;
              if (progress <= start) {
                x = 112;
              } else if (progress >= end) {
                x = 0;
              } else {
                const t = (progress - start) / Math.max(0.0001, end - start);
                x = (1 - t) * 112;
              }
            }
            card.style.transform = `translate3d(${x.toFixed(2)}%, 0, 0)`;
            card.style.zIndex = String(50 + index);
          });

          requestAnimationFrame(tick);
        };

        requestAnimationFrame(tick);
      }

      function render() {
        const app = document.getElementById("app");
        document.getElementById("desktopNav").innerHTML = navMarkup(activeTab);

        const map = {
          services: servicesPage,

        app.innerHTML = (map[page] || servicesPage)();
        initAdvisoryTrackMotion();
        initCloneHeroFx();
        initScrollReveal();
        initMarqueeDrag();
        initLogoMosaic();

      function scrollToKbwSection(smooth = true) {
        const kbwSection = document.getElementById("kbw-access-section");
        if (!kbwSection) return;
        kbwSection.scrollIntoView({ behavior: smooth ? "smooth" : "auto", block: "start" });
      }

      function scrollToAdvisoryTracks(smooth = true) {
        const advisory = document.getElementById("advisory-tracks");
        if (!advisory) return;
        advisory.scrollIntoView({ behavior: smooth ? "smooth" : "auto", block: "start" });
      }

      function scrollToPortfolioSection(smooth = true) {
        const portfolio = document.getElementById("portfolio-section");
        if (!portfolio) return;
        const y = window.scrollY + portfolio.getBoundingClientRect().top - 120;
        window.scrollTo({ top: Math.max(0, y), behavior: smooth ? "smooth" : "auto" });
      }

      function go(next) {
        if (next === "home") {
          page = "services";
          activeTab = next;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }

        if (next === "services") {
          page = "services";
          activeTab = next;
          render();
          requestAnimationFrame(() => scrollToAdvisoryTracks(true));
          return;
        }

        if (next === "portfolio") {
          page = "services";
          activeTab = next;
          render();
          requestAnimationFrame(() => scrollToPortfolioSection(true));
          return;
        }

        page = next === "contact" ? "contact" : "services";
        activeTab = next;
        render();
      }

      window.go = go;
      render();
    </script>
